# Group: Student
- model: auth.group
  fields:
    name: Student
    permissions:
    - - view_user
      - openbook_auth
      - user
    - - view_course
      - openbook_content
      - course
    - - view_courseprogress
      - openbook_gamification
      - courseprogress
    - - view_skillprogress
      - openbook_gamification
      - skillprogress

- model: openbook_auth.group
  fields:
    group_ptr:
    - Student
    slug: student

